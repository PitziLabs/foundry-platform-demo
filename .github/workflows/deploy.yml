# .github/workflows/deploy.yml
#
# Build & Deploy: Ice Cream Cookbook → ECR → ECS Fargate
#
# Triggers:
#   1. Push to main that changes app code or this workflow
#   2. repository_dispatch from ice-cream-book (recipe content changed)
#   3. Manual workflow_dispatch from GitHub UI
#
# Authenticates via OIDC (no stored secrets). Builds the Astro static
# site, packages it in an nginx container, pushes to ECR, and tells
# ECS to roll out a new deployment.

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  repository_dispatch:
    types: [recipe-updated]      # Fired by ice-cream-book when recipes change on main
  workflow_dispatch: {}           # Manual trigger from GitHub UI

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read     # Required to checkout the repo

env:
  AWS_REGION: us-east-1
  ECR_REPO: foundry-dev-app
  ECS_CLUSTER: foundry-dev-cluster
  ECS_SERVICE: foundry-dev-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout both repos ---
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Clone cookbook recipes
        run: git clone https://github.com/PitziLabs/ice-cream-book.git /tmp/ice-cream-book

      # --- Build the Astro static site ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Astro dependencies
        working-directory: app/ice_cream_site
        run: npm ci

      - name: Sync recipes into Astro content
        working-directory: app/ice_cream_site
        run: python3 sync_recipes.py
        env:
          RECIPE_SOURCE: /tmp/ice-cream-book/recipes

      - name: Build static site
        working-directory: app/ice_cream_site
        run: npx astro build

      # --- Authenticate to AWS via OIDC ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::365184644049:role/foundry-dev-github-actions # Account-specific OIDC role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build and push Docker image ---
      - name: Build and push container image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f app/Dockerfile \
            -t $REGISTRY/$ECR_REPO:latest \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG \
            app/

          docker push $REGISTRY/$ECR_REPO:latest
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG

      # --- Deploy to ECS ---
      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION \
            --no-cli-pager

      - name: Wait for deployment to stabilize
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "Deployment complete!"

          echo "### ✅ Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** [icecreamtofightover.com](https://icecreamtofightover.com)" >> $GITHUB_STEP_SUMMARY
